<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entero Reactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="wrapper">

        <div class="titulo-principal">
            ENTERO REACTIVO
            <span class="titulo-barra"></span>
        </div>

        <div class="variables-panel">

            <div class="variable-card">
                <span class="variable-etiqueta">X</span>
                <div class="variable-controles">
                    <button id="btn-x-decrementar" class="btn-control btn-menos">&minus;</button>
                    <input id="input-x" type="number" class="variable-input" value="5" step="1" placeholder="0">
                    <button id="btn-x-incrementar" class="btn-control btn-mas">&plus;</button>
                </div>
            </div>

            <div class="operador-central">+</div>

            <div class="variable-card">
                <span class="variable-etiqueta">Y</span>
                <div class="variable-controles">
                    <button id="btn-y-decrementar" class="btn-control btn-menos">&minus;</button>
                    <input id="input-y" type="number" class="variable-input" value="3" step="1" placeholder="0">
                    <button id="btn-y-incrementar" class="btn-control btn-mas">&plus;</button>
                </div>
            </div>
        </div>

        <div class="resultado-panel">
            <span class="resultado-etiqueta">Z = X + Y</span>
            <span id="valor-z" class="resultado-valor">8</span>
        </div>

    </div>

    <script src="../../src/components/EnteroReactivo.js"></script>
    <script src="../../src/app.js"></script>
</body>
</html>
